<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lí Hồ Sơ Chuyển đổi số</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="header-banner">
            <h1>Hệ thống Quản lí Hồ Sơ Chuyển đổi số</h1>
            <p>Sở Giáo dục và Đào tạo - Ứng dụng quản lý tiến trình chuyển đổi số các trường học</p>
        </header>
        <div class="container main-layout">
        <aside class="sidebar">
            <div class="card">
                <h3 class="form-title"> Thêm hồ sơ mới</h3>
                <form>
                    <div class="form-group">
                        <label>Tên trường</label>
                        <input type="text" placeholder="VD: Trường THPT Nguyễn Huệ">
                    </div>
                    <div class="form-group">
                        <label>Đơn vị quản lý</label>
                        <select>
                            <option>-- Chọn đơn vị --</option>
                            <option>Phòng GD&ĐT TP. Thủy Lợi</option>
                            <option>Phòng GD&ĐT H. Thủy Nguyên</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Trạng thái chuyển đổi</label>
                        <select>
                            <option>-- Chọn trạng thái --</option>
                            <option>Chưa bắt đầu</option>
                            <option>Đang triển khai</option>
                            <option>Hoàn thành</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Mô tả Tiến độ</label>
                        <textarea rows="3" placeholder="Mô tả tình hình chuyển đổi số..."></textarea>
                    </div>
                    <button type="button" class="btn-primary">➕ Thêm hồ sơ</button>
                </form>
            </div>
        </aside>

</body

</html>
