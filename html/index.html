<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Hồ sơ Chuyển đổi Số</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <h1>Hệ thống Quản lý Hồ sơ Chuyển đổi Số</h1>
        <p>Sở Giáo dục & Đào tạo — Ứng dụng quản lý tiến trình chuyển đổi số các trường học</p>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="card-form">
                <h3>Thêm hồ sơ mới</h3>
                <form id="addForm">
                    <div class="form-group">
                        <label>Tên trường</label>
                        <input type="text" id="schoolName" class="form-control" placeholder="VD: Trường THPT Nguyễn Huệ" required>
                    </div>
                    <div class="form-group">
                        <label>Đơn vị quản lý</label>
                        <select id="manageUnit" class="form-control" required>
                            <option value="">-- Chọn đơn vị --</option>
                            <option value="Phòng GD&ĐT TP. Thủy Lợi">Phòng GD&ĐT TP. Thủy Lợi</option>
                            <option value="Phòng GD&ĐT H. Thủy Nguyên">Phòng GD&ĐT H. Thủy Nguyên</option>
                            <option value="Phòng GD&ĐT Q. Hồng Bàng">Phòng GD&ĐT Q. Hồng Bàng</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Trạng thái chuyển đổi</label>
                        <select id="status" class="form-control" required>
                            <option value="">-- Chọn trạng thái --</option>
                            <option value="Chưa bắt đầu">Chưa bắt đầu</option>
                            <option value="Đang triển khai">Đang triển khai</option>
                            <option value="Hoàn thành">Hoàn thành</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Mô tả Tiến độ</label>
                        <textarea id="description" class="form-control" placeholder="Mô tả tình hình chuyển đổi số..."></textarea>
                    </div>
                    <button type="submit" class="btn-submit">+ Thêm hồ sơ</button>
                </form>
            </div>
        </aside>

        <main class="main-content">
            <div class="tabs" id="filterTabs">
                <button class="tab-btn active" data-filter="Tất cả">Tất cả</button>
                <button class="tab-btn" data-filter="Chưa bắt đầu">Chưa bắt đầu</button>
                <button class="tab-btn" data-filter="Đang triển khai">Đang triển khai</button>
                <button class="tab-btn" data-filter="Hoàn thành">Hoàn thành</button>
                <span class="tab-count"><span id="recordCount">0</span> hồ sơ</span>
            </div>

            <div class="record-list" id="recordList">
                </div>
        </main>
    </div>

    <script src="data/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
